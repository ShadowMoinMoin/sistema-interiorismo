<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones - DL Interiorismo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/cotizaciones.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            <img src="/img/img_2-removebg-preview.png"
                 alt="DL Interiorismo">
        </div>

        <nav class="menu">

            <div class="menu-top">

                <a href="dashboard.html">
                    <i class="bi bi-grid"></i>
                    Dashboard
                </a>

                <a href="clientes.html">
                    <i class="bi bi-person"></i>
                    Clientes
                </a>

                <a href="empleados.html">
                    <i class="bi bi-people"></i>
                    Empleados
                </a>

                <a href="proyectos.html">
                    <i class="bi bi-folder"></i>
                    Proyectos
                </a>

                <a class="active" href="cotizaciones.html">
                    <i class="bi bi-cash-stack"></i>
                    Cotizaciones
                </a>

                <a href="facturas.html">
                    <i class="bi bi-file-earmark-text"></i>
                    Facturas
                </a>

                <a href="pagos.html">
                    <i class="bi bi-credit-card"></i>
                    Pagos
                </a>

                <a href="tareas.html">
                    <i class="bi bi-check2-square"></i>
                    Tareas
                </a>

                <a href="reportes.html">
                    <i class="bi bi-bar-chart"></i>
                    Reportes
                </a>

            </div>

            <div class="menu-bottom">
                <a href="login.html">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </a>
            </div>

        </nav>

    </aside>

    <main class="content">

        <div class="topbar">

            <h1>Cotizaciones</h1>

        </div>

        <!-- FORMULARIO -->

        <section class="box">

            <div class="box-header">
                <h2>Nueva Cotización</h2>
            </div>

            <div class="form-grid">

                <select id="idProyecto">
                    <option value="">Seleccione proyecto</option>
                </select>

                <input id="metraje"
                       type="number"
                       step="0.01"
                       placeholder="Metraje lineal">

                <button class="btn-primary"
                        onclick="guardarCotizacion()">

                    <i class="bi bi-floppy"></i>
                    Guardar Cotización

                </button>

            </div>

        </section>

        <!-- DETALLE -->

        <div class="cotizacion-grid">

            <!-- DETALLE -->
            <section class="box">

                <div class="box-header">
                    <h2>Detalle Calculado</h2>
                </div>

                <div class="detalle-scroll">
                    <table>
                        <thead>
                        <tr>
                            <th>Concepto</th>
                            <th>Unidad</th>
                            <th>Cantidad</th>
                            <th>P. Unit.</th>
                            <th>Total</th>
                        </tr>
                        </thead>

                        <tbody id="tablaDetalle">
                        <tr>
                            <td colspan="5">
                                Ingrese el metraje para calcular.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </section>

            <!-- LISTADO -->
            <section class="box">

                <div class="box-header">
                    <h2>Lista de Cotizaciones</h2>
                </div>

                <table>
                    <thead>
                    <tr>
                        <th>Proyecto</th>
                        <th>Fecha</th>
                        <th>Metraje</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                    </thead>

                    <tbody id="tablaCotizaciones"></tbody>
                </table>

            </section>

        </div>

    </main>

</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/cotizaciones.js"></script>

</body>
</html>
