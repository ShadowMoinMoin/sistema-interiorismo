<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas - DL Interiorismo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/facturas.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            <img src="/img/img_2-removebg-preview.png"
                 alt="DL Interiorismo">
        </div>

        <nav class="menu">

            <div class="menu-top">

                <a href="dashboard.html">
                    <i class="bi bi-grid"></i>
                    Dashboard
                </a>

                <a href="clientes.html">
                    <i class="bi bi-person"></i>
                    Clientes
                </a>

                <a href="empleados.html">
                    <i class="bi bi-people"></i>
                    Empleados
                </a>

                <a href="proyectos.html">
                    <i class="bi bi-folder"></i>
                    Proyectos
                </a>

                <a href="cotizaciones.html">
                    <i class="bi bi-cash-stack"></i>
                    Cotizaciones
                </a>

                <a class="active" href="facturas.html">
                    <i class="bi bi-file-earmark-text"></i>
                    Facturas
                </a>

                <a href="pagos.html">
                    <i class="bi bi-credit-card"></i>
                    Pagos
                </a>

                <a href="tareas.html">
                    <i class="bi bi-check2-square"></i>
                    Tareas
                </a>

                <a href="reportes.html">
                    <i class="bi bi-bar-chart"></i>
                    Reportes
                </a>

            </div>

            <div class="menu-bottom">
                <a href="login.html">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </a>
            </div>

        </nav>

    </aside>

    <!-- CONTENIDO -->

    <main class="content">

        <div class="topbar">

            <h1>Facturas</h1>

        </div>

        <!-- FORMULARIO -->

        <section class="box">

            <div class="box-header">
                <h2>Nueva Factura</h2>
            </div>

            <div class="form-grid">

                <select id="idCotizacion">
                    <option value="">
                        Seleccione cotización
                    </option>
                </select>

                <select id="estado">
                    <option value="Pendiente">Pendiente</option>
                    <option value="Pagado">Pagado</option>
                    <option value="Anulado">Anulado</option>
                </select>

                <button class="btn-primary"
                        onclick="guardarFactura()">

                    <i class="bi bi-floppy"></i>
                    Generar Factura

                </button>

            </div>

        </section>

        <!-- LISTADO -->

        <section class="box">

            <div class="box-header">
                <h2>Lista de Facturas</h2>
            </div>

            <table>

                <thead>
                <tr>
                    <th>Número Factura</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
                </thead>

                <tbody id="tablaFacturas"></tbody>

            </table>

        </section>

    </main>

</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/facturas.js"></script>

</body>
</html>
