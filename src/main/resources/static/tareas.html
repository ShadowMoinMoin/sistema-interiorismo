<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tareas</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">DL INTERIORISMO</div>
        <nav class="menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="empleados.html">Empleados</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="cotizaciones.html">Cotizaciones</a>
            <a href="facturas.html">Facturas</a>
            <a href="pagos.html">Pagos</a>
            <a class="active" href="tareas.html">Tareas</a>
            <a href="reportes.html">Reportes</a>
            <a href="index.html">Cerrar sesión</a>
        </nav>
    </aside>

    <main class="content">
        <h1>Tareas</h1>
        <p>Asignación y control de tareas por proyecto.</p>

        <section class="table-card">
            <h2>Nueva Tarea</h2>

            <select id="idProyecto">
                <option value="">Seleccione proyecto</option>
            </select>

            <select id="idEmpleado">
                <option value="">Seleccione empleado</option>
            </select>

            <input id="descripcion" placeholder="Descripción de la tarea">

            <label>Fecha límite</label>
            <input id="fechaLimite" type="date">

            <select id="estado">
                <option value="Pendiente">Pendiente</option>
                <option value="En Proceso">En Proceso</option>
                <option value="Completada">Completada</option>
                <option value="Cancelada">Cancelada</option>
            </select>

            <button class="btn-guardar" onclick="guardarTarea()">💾 Guardar Tarea</button>
        </section>

        <br>

        <section class="table-card">
            <h2>Lista de Tareas</h2>

            <table class="tabla-clientes">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Proyecto</th>
                    <th>Empleado</th>
                    <th>Descripción</th>
                    <th>Fecha límite</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="tablaTareas"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="toast" class="toast"></div>

<script src="js/tareas.js"></script>
</body>
</html>
