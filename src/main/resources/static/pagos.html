<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pagos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div class="logo">DL INTERIORISMO</div>
        <nav class="menu">
            <a href="dashboard.html">Dashboard</a>
            <a href="clientes.html">Clientes</a>
            <a href="empleados.html">Empleados</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="cotizaciones.html">Cotizaciones</a>
            <a href="facturas.html">Facturas</a>
            <a class="active" href="pagos.html">Pagos</a>
            <a href="tareas.html">Tareas</a>
            <a href="reportes.html">Reportes</a>
            <a href="index.html">Cerrar sesión</a>
        </nav>
    </aside>

    <main class="content">
        <h1>Pagos</h1>
        <p>Registro y control de pagos realizados.</p>

        <section class="table-card">
            <h2>Nuevo Pago</h2>

            <select id="idFactura">
                <option value="">Seleccione factura</option>
            </select>

            <select id="metodoPago">
                <option value="">Seleccione método</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Billetera Digital">Billetera Digital</option>
            </select>

            <input id="monto" type="number" step="0.01" placeholder="Monto pagado">
            <input id="referencia" placeholder="Referencia u operación">

            <button class="btn-guardar" onclick="guardarPago()">💾 Registrar Pago</button>
        </section>

        <br>

        <section class="table-card">
            <h2>Lista de Pagos</h2>

            <table class="tabla-clientes">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Factura</th>
                    <th>Fecha</th>
                    <th>Método</th>
                    <th>Monto</th>
                    <th>Referencia</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="tablaPagos"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="toast" class="toast"></div>

<script src="js/pagos.js"></script>
</body>
</html>
