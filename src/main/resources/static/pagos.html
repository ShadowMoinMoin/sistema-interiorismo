<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - DL Interiorismo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/pagos.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            <img src="/img/img_2-removebg-preview.png"
                 alt="DL Interiorismo">
        </div>

        <nav class="menu">

            <div class="menu-top">

                <a href="dashboard.html">
                    <i class="bi bi-grid"></i>
                    Dashboard
                </a>

                <a href="clientes.html">
                    <i class="bi bi-person"></i>
                    Clientes
                </a>

                <a href="empleados.html">
                    <i class="bi bi-people"></i>
                    Empleados
                </a>

                <a href="proyectos.html">
                    <i class="bi bi-folder"></i>
                    Proyectos
                </a>

                <a href="cotizaciones.html">
                    <i class="bi bi-cash-stack"></i>
                    Cotizaciones
                </a>

                <a href="facturas.html">
                    <i class="bi bi-file-earmark-text"></i>
                    Facturas
                </a>

                <a class="active" href="pagos.html">
                    <i class="bi bi-credit-card"></i>
                    Pagos
                </a>

                <a href="tareas.html">
                    <i class="bi bi-check2-square"></i>
                    Tareas
                </a>

                <a href="reportes.html">
                    <i class="bi bi-bar-chart"></i>
                    Reportes
                </a>

            </div>

            <div class="menu-bottom">

                <a href="login.html">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </a>

            </div>

        </nav>

    </aside>

    <main class="content">

        <div class="topbar">

            <h1>Pagos</h1>
        </div>

        <!-- FORMULARIO -->

        <section class="box">

            <div class="box-header">
                <h2>Nuevo Pago</h2>
            </div>

            <div class="form-grid">

                <select id="idFactura">
                    <option value="">Seleccione factura</option>
                </select>

                <select id="metodoPago">
                    <option value="">Seleccione método</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Billetera Digital">Billetera Digital</option>
                </select>

                <input id="monto"
                       type="number"
                       step="0.01"
                       placeholder="Monto pagado">

                <input id="referencia"
                       placeholder="Referencia u operación">

                <button class="btn-primary"
                        onclick="guardarPago()">

                    <i class="bi bi-floppy"></i>
                    Registrar Pago

                </button>

            </div>

        </section>

        <!-- TABLA -->

        <section class="box">

            <div class="box-header">
                <h2>Lista de Pagos</h2>
            </div>

            <table>

                <thead>
                <tr>
                    <th>Factura</th>
                    <th>Fecha</th>
                    <th>Método</th>
                    <th>Monto</th>
                    <th>Referencia</th>
                    <th>Acción</th>
                </tr>
                </thead>

                <tbody id="tablaPagos">
                </tbody>

            </table>

        </section>

    </main>

</div>

<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/pagos.js"></script>

</body>
</html>
