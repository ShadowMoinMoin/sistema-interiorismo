<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - DL Interiorismo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/proyectos.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="app">


        <aside class="sidebar">

            <div class="logo">
                <img src="/img/img_2-removebg-preview.png" alt="DL Interiorismo">
            </div>

            <nav class="menu">

                <div class="menu-top">

                    <a href="dashboard.html">
                        <i class="bi bi-grid"></i>
                        Dashboard
                    </a>

                    <a href="clientes.html">
                        <i class="bi bi-person"></i>
                        Clientes
                    </a>

                    <a href="empleados.html">
                        <i class="bi bi-people"></i>
                        Empleados
                    </a>

                    <a class="active" href="proyectos.html">
                        <i class="bi bi-folder"></i>
                        Proyectos
                    </a>

                    <a href="cotizaciones.html">
                        <i class="bi bi-cash-stack"></i>
                        Cotizaciones
                    </a>

                    <a href="facturas.html">
                        <i class="bi bi-file-earmark-text"></i>
                        Facturas
                    </a>

                    <a href="pagos.html">
                        <i class="bi bi-credit-card"></i>
                        Pagos
                    </a>

                    <a href="tareas.html">
                        <i class="bi bi-check2-square"></i>
                        Tareas
                    </a>

                    <a href="reportes.html">
                        <i class="bi bi-bar-chart"></i>
                        Reportes
                    </a>

                </div>

                <div class="menu-bottom">
                    <a href="login.html">
                        <i class="bi bi-box-arrow-right"></i>
                        Cerrar sesión
                    </a>
                </div>

            </nav>

        </aside>

        <!-- CONTENIDO -->

        <main class="content">

            <div class="topbar">

                <h1>Proyectos</h1>

            </div>

            <!-- FORMULARIO -->

            <section class="box">

                <div class="box-header">
                    <h2>Nuevo Proyecto</h2>
                </div>

                <div class="form-grid">

                    <select id="idCliente">
                        <option value="">Seleccione cliente</option>
                    </select>

                    <select id="idTipo">
                        <option value="">Seleccione tipo de proyecto</option>
                    </select>

                    <input id="nombreProyecto" type="text" placeholder="Nombre del proyecto">

                    <input id="fechaInicio" type="date">

                    <input id="fechaFin" type="date">

                    <select id="estado">
                        <option value="">Seleccione estado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Proceso">En Proceso</option>
                        <option value="Finalizado">Finalizado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>

                    <input id="descripcion" type="text" placeholder="Descripción">

                    <button class="btn-primary" onclick="guardarProyecto()">

                        <i class="bi bi-floppy"></i>
                        Guardar Proyecto

                    </button>

                </div>

            </section>

            <!-- TABLA -->

            <section class="box">

                <div class="box-header">
                    <h2>Lista de Proyectos</h2>
                </div>

                <table>

                    <thead>
                        <tr>
                            <th>Proyecto</th>
                            <th>Cliente</th>
                            <th>Tipo</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>

                    <tbody id="tablaProyectos"></tbody>

                </table>

            </section>

        </main>

    </div>

    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/proyectos.js"></script>

</body>

</html>
