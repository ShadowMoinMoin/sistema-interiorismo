<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DL Interiorismo</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- LOGO -->
        <div class="logo">
            <img src="/img/img_2-removebg-preview.png" alt="DL Interiorismo">
        </div>

        <!-- MENÚ PRINCIPAL -->
        <nav class="menu">

            <div class="menu-top">

                <a class="active" href="dashboard.html">
                    <i class="bi bi-grid"></i>
                    Dashboard
                </a>

                <a href="clientes.html">
                    <i class="bi bi-person"></i>
                    Clientes
                </a>

                <a href="empleados.html">
                    <i class="bi bi-people"></i>
                    Empleados
                </a>

                <a href="proyectos.html">
                    <i class="bi bi-folder"></i>
                    Proyectos
                </a>

                <a href="cotizaciones.html">
                    <i class="bi bi-cash-stack"></i>
                    Cotizaciones
                </a>

                <a href="facturas.html">
                    <i class="bi bi-file-earmark-text"></i>
                    Facturas
                </a>

                <a href="pagos.html">
                    <i class="bi bi-credit-card"></i>
                    Pagos
                </a>

                <a href="tareas.html">
                    <i class="bi bi-check2-square"></i>
                    Tareas
                </a>

                <a href="reportes.html">
                    <i class="bi bi-bar-chart"></i>
                    Reportes
                </a>

            </div>
            <div class="menu-bottom">
                <a href="login.html">
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </a>
            </div>

        </nav>

    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <!-- TOPBAR -->
        <div class="topbar">
            <h1>Dashboard Principal</h1>
        </div>

        <!-- TARJETAS -->
        <section class="cards">

            <div class="card">
                <h3>Proyectos Activos</h3>
                <div class="number" id="totalProyectos">0</div>
            </div>

            <div class="card">
                <h3>Cotizaciones</h3>
                <div class="number" id="totalCotizaciones">0</div>
            </div>

            <div class="card">
                <h3>Facturas Emitidas</h3>
                <div class="number" id="totalFacturas">0</div>
            </div>

            <div class="card">
                <h3>Pagos Registrados</h3>
                <div class="number" id="totalPagos">0</div>
            </div>

        </section>

        <!-- FILA PRINCIPAL -->
        <section class="dashboard-grid">

            <!-- PROYECTOS -->
            <div class="box proyectos">

                <div class="box-header">
                    <h2>Proyectos recientes</h2>
                </div>

                <table>
                    <thead>
                    <tr>
                        <th>Proyecto</th>
                        <th>Estado</th>
                        <th>Fecha Fin</th>
                    </tr>
                    </thead>

                    <tbody id="tablaProyectos">
                    </tbody>

                </table>

            </div>

            <!-- DONUT -->
            <div class="box">

                <div class="box-header">
                    <h2>Resumen de Actividad</h2>
                </div>

                <canvas id="donutChart"></canvas>

            </div>

        </section>



        <!-- TAREAS -->
        <section class="box tareas-box">

            <div class="box-header">
                <h2>Tareas Pendientes</h2>
            </div>

            <ul id="listaTareas"></ul>

        </section>

    </main>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
